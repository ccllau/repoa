<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>통합 뮤직 플레이어</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
      --bg-color: #121212;
      --card-bg: #1a1a1a;
    }

    /* 전체 레이아웃 초기화 */
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg-color); color: #fff; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; }

    /* [고정 상단] 헤더 및 플레이어 영역 */
    .fixed-header { 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background: var(--bg-color); 
      z-index: 1000; 
      padding-bottom: 10px; 
      flex-shrink: 0; 
      border-bottom: 1px solid #222;
    }

    /* 중앙 정렬용 컨테이너 (PC/모바일 공통) */
    .content-width { width: 92%; max-width: 420px; margin: 0 auto; }

    /* 네비게이션 버튼 */
    /* 앨범 플레이어용 콤팩트 버튼 디자인 */
.nav { 
    display: flex; 
    gap: 8px; 
    margin: 15px auto; 
    background: rgba(255, 255, 255, 0.02); 
    padding: 5px 15px; 
    border-radius: 50px; 
    width: fit-content; 
    min-width: 220px;
    justify-content: center; /* 중앙 정렬 보장 */
}

.nav button, .nav a { 
    flex: none; 
    width: 65px; 
    border: none; 
    background: #0a0a0a; 
    color: #444; 
    padding: 6px 0; 
    border-radius: 20px; 
    font-size: 10px; 
    font-weight: 500; 
    cursor: pointer; 
    text-decoration: none; /* a 태그일 경우 대비 */
    display: inline-block; /* 레이아웃 유지 */
    text-align: center;
    transition: all 0.4s ease;
    border: 1px solid rgba(255, 255, 255, 0.03);
}

/* 활성화된 버튼 (파란 대비 강조) */
.nav button.active, .nav a.active { 
    background: #001a33 !important; /* 어두운 심해색 */
    color: #00d2ff !important; /* 밝은 네온 블루 */
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); 
    border: 1px solid #00d2ff; 
    transform: translateY(-1px);
}

    /* 앨범 사진 영역 (2/3 축소 및 고정) */
    .album-zone { 
      width: 100%; 
      aspect-ratio: 16 / 10; 
      margin: 10px 0; 
      overflow: hidden; 
      border-radius: 12px; 
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    #albumArt { width: 100%; height: 100%; object-fit: cover; }

    /* 곡 정보 및 타임코드 */
    .song-info { text-align: center; margin: 10px 0 5px; }
    .title { font-size: 16px; font-weight: 600; color: var(--neon-blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .time-display { font-size: 12px; color: #888; text-align: center; margin-bottom: 8px; }

    /* 재생 바 */
    .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; cursor: pointer; margin-bottom: 15px; }
    .progress-fill { height: 100%; background: var(--neon-blue); width: 0%; border-radius: 2px; transition: width 0.1s linear; }

    /* 컨트롤 버튼 */
    .controls { display: flex; justify-content: center; align-items: center; gap: 35px; margin-bottom: 5px; }
    .btn-play-box { width: 48px; height: 48px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
    .ctrl-btn { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; padding: 5px; }
    .random-btn { font-size: 13px !important; color: #666; }

    /* [스크롤 영역] 하단 리스트 */
    .playlist-wrapper { 
      width: 100%; 
      flex-grow: 1; 
      overflow-y: auto; 
      background: #151515;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .playlist-table { width: 100%; max-width: 420px; border-collapse: collapse; margin-bottom: 20px; }
    .playlist-table tr { border-bottom: 1px solid #1f1f1f; cursor: pointer; transition: 0.2s; }
    .playlist-table tr:hover { background: rgba(255,255,255,0.02); }
    .playlist-table td { padding: 14px 20px; font-size: 14px; color: #bbb; line-height: 1.4; }
    .playlist-table tr.active { background: rgba(0, 210, 255, 0.08); }
    .playlist-table tr.active td { color: var(--neon-blue); font-weight: bold; }

    /* 스크롤바 디자인 */
    .playlist-wrapper::-webkit-scrollbar { width: 5px; }
    .playlist-wrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="content-width">
    <div class="nav" id="menu">
      <button onclick="loadCategory('old')" id="old">OLD</button>
      <button onclick="loadCategory('enka')" id="enka">ENKA</button>
      <button onclick="loadCategory('jazz')" id="jazz">JAZZ</button>
    </div>

    <div class="player-card">
      <div class="album-zone">
        <img id="albumArt" src="https://via.placeholder.com/400x250?text=Loading..." alt="Album Cover">
      </div>

      <div class="song-info">
        <div class="title" id="labelTitle">곡을 선택해 주세요</div>
      </div>
      
      <div class="time-display"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
      
      <div class="progress-container" id="progArea" onclick="seek(event)">
        <div class="progress-fill" id="progFill"></div>
      </div>
      
      <audio id="player"></audio>

      <div class="controls">
        <button class="ctrl-btn" onclick="prevSong()">⏮</button>
        <div class="btn-play-box" onclick="togglePlay()"><span id="btnIcon" style="color:var(--neon-blue);font-size:22px;">▶</span></div>
        <button class="ctrl-btn" onclick="nextSong()">⏭</button>
        <button class="ctrl-btn random-btn" onclick="randomSong()">랜덤</button>
      </div>
    </div>
  </div>
</div>

<div class="playlist-wrapper" id="scrollContainer">
  <table class="playlist-table" id="listTable">
    <tbody id="playlistBody"></tbody>
  </table>
</div>

<script>
const user = "berosee";
const repo = "repoa";
let songs = [];
let names = [];
let index = 0;

const player = document.getElementById("player");
const albumArt = document.getElementById("albumArt");

// 카테고리 로드
async function loadCategory(folder) {
    setActiveButton(folder);

    // [수정된 부분] 끝에 ?v=${new Date().getTime()} 를 추가하여 캐시를 방지합니다.
    const cacheBuster = new Date().getTime(); 
    const coverUrl = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${folder}/cover.jpg?v=${cacheBuster}`;
    
    albumArt.src = coverUrl;

    // 이미지 로딩 실패 시 (파일이 없거나 삭제된 경우) 기본 이미지 처리
    albumArt.onerror = () => { 
        albumArt.src = "https://via.placeholder.com/150?text=No+Cover"; 
    };

    const api = `https://api.github.com/repos/${user}/${repo}/contents/${folder}`;
    try {
        const res = await fetch(api);
        const data = await res.json();
        songs = []; names = [];
        let html = '';
        data.forEach(file => {
            const fileName = file.name.toLowerCase();
            if(fileName.endsWith(".mp3") || fileName.endsWith(".flac")) {
                const url = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${folder}/${file.name}`;
                songs.push(url);
                names.push(file.name);
                html += `<tr onclick="play(${songs.length-1})"><td>${file.name}</td></tr>`;
            }
        });
        document.getElementById("playlistBody").innerHTML = html;
        updateUI(); // 카테고리 이동 후 현재 재생 곡 표시 유지
    } catch(e) { console.error("데이터 로드 실패"); }
}

function setActiveButton(folderId) {
    document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
    const btn = document.getElementById(folderId);
    if(btn) btn.classList.add('active');
}

function play(i) {
    index = i;
    player.src = songs[index];
    player.play();
    document.getElementById("labelTitle").textContent = names[index];
    updateUI();
}

function togglePlay() {
    if (!player.src) { if(songs.length > 0) play(0); return; }
    player.paused ? player.play() : player.pause();
}

function updateUI() {
    const rows = document.querySelectorAll("#playlistBody tr");
    rows.forEach((row, k) => {
        row.classList.toggle("active", k === index);
        if (k === index) {
            row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    });
}

function nextSong() { if(songs.length === 0) return; index = (index + 1) % songs.length; play(index); }
function prevSong() { if(songs.length === 0) return; index = (index - 1 + songs.length) % songs.length; play(index); }
function randomSong() { if(songs.length === 0) return; index = Math.floor(Math.random() * songs.length); play(index); }

function seek(e) {
    if(!player.duration) return;
    const rect = document.getElementById("progArea").getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    player.currentTime = pos * player.duration;
}

player.addEventListener("ended", nextSong);
player.addEventListener("play", () => { document.getElementById("btnIcon").textContent = "Ⅱ"; });
player.addEventListener("pause", () => { document.getElementById("btnIcon").textContent = "▶"; });
player.ontimeupdate = () => {
    if (player.duration) {
        const cur = player.currentTime;
        const dur = player.duration;
        document.getElementById("curTime").textContent = formatTime(cur);
        document.getElementById("durTime").textContent = formatTime(dur);
        document.getElementById("progFill").style.width = (cur / dur * 100) + "%";
    }
};

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

// 시작 시 'old' 카테고리 로드
loadCategory('old');
</script>
</body>
</html>
